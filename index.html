<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="아이 눈높이에 맞춘 나이별 국어사전" />
  <title>우리 아이 국어사전</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-decoration">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
  </div>

  <div class="container">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">📖</span>
        <div>
          <h1 class="logo-title">우리 아이 국어사전</h1>
          <p class="logo-sub">나이에 맞게 쉽게 설명해드려요</p>
        </div>
      </div>
    </header>

    <section class="age-section">
      <p class="section-label">아이 나이를 골라주세요</p>
      <div class="age-tabs">
        <button class="age-tab" data-age="3">
          <span class="age-emoji">🐣</span>
          <span class="age-text">3~4살</span>
        </button>
        <button class="age-tab active" data-age="5">
          <span class="age-emoji">🐥</span>
          <span class="age-text">5~6살</span>
        </button>
        <button class="age-tab" data-age="7">
          <span class="age-emoji">🐓</span>
          <span class="age-text">7~8살</span>
        </button>
        <button class="age-tab" data-age="10">
          <span class="age-emoji">🦅</span>
          <span class="age-text">9~10살</span>
        </button>
      </div>
    </section>

    <section class="search-section">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="궁금한 단어를 입력해봐요..."
          autocomplete="off"
        />
        <button class="search-btn" id="searchBtn" onclick="searchWord()">찾기</button>
      </div>
    </section>

    <section class="history-section" id="historySection" style="display:none">
      <p class="section-label">오늘 찾아본 단어</p>
      <div class="chip-row" id="historyRow"></div>
    </section>

    <section class="quick-section">
      <p class="section-label">자주 찾는 단어</p>
      <div class="chip-row">
        <button class="chip chip-quick" onclick="quickSearch('사랑')">사랑</button>
        <button class="chip chip-quick" onclick="quickSearch('우정')">우정</button>
        <button class="chip chip-quick" onclick="quickSearch('감사')">감사</button>
        <button class="chip chip-quick" onclick="quickSearch('용기')">용기</button>
        <button class="chip chip-quick" onclick="quickSearch('질투')">질투</button>
        <button class="chip chip-quick" onclick="quickSearch('민주주의')">민주주의</button>
      </div>
    </section>

    <section id="resultSection"></section>
  </div>

  <script src="app.js"></script>
</body>
</html>
